<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Rachel K. Lloyd, CPA, CITP</title>
  <meta name="description" content="Get in touch with Rachel K. Lloyd — CPA and CITP professional bridging accounting and technology.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #07a2be;
      --accent-light: #e3f5f9;
      --accent-mid: #7dcbdb;
      --accent-dark: #055f70;
      --bg: #fafaf8;
      --bg-white: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #5a5a5a;
      --text-tertiary: #9a9a9a;
      --border: #e8e8e4;
      --font-body: 'DM Sans', sans-serif;
      --font-display: 'Lora', serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Navigation */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2.5rem;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-link {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 4px 0;
      border-bottom: 1.5px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--accent-dark);
      border-bottom-color: var(--accent);
    }

    /* Contact content */
    .contact-section {
      max-width: 600px;
      margin: 0 auto;
      padding: 4rem 2.5rem;
    }

    .page-eyebrow {
      font-size: 12px;
      color: var(--accent-dark);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }

    .contact-desc {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    /* Form */
    .form-card {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      font-size: 14px;
      font-family: var(--font-body);
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text-primary);
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-textarea {
      width: 100%;
      padding: 11px 14px;
      font-size: 14px;
      font-family: var(--font-body);
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text-primary);
      resize: vertical;
      min-height: 130px;
      transition: border-color 0.2s;
    }

    .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-submit {
      display: inline-block;
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.2s;
    }

    .form-submit:hover {
      background: var(--accent-dark);
    }

    .form-note {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 1.25rem;
      line-height: 1.6;
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2.5rem;
      text-align: center;
      background: var(--bg-white);
    }

    .footer-text {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* Mobile responsive */
    @media (max-width: 700px) {
      .nav {
        padding: 1rem 1.25rem;
      }

      .nav-logo {
        font-size: 15px;
      }

      .nav-links {
        gap: 1.25rem;
      }

      .nav-link {
        font-size: 13px;
      }

      .contact-section {
        padding: 2.5rem 1.25rem;
      }

      .page-title {
        font-size: 24px;
      }

      .form-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">Rachel K. Lloyd, CPA, CITP</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link active">Contact</a>
    </div>
  </nav>

  <main>
    <section class="contact-section">
      <div class="page-eyebrow">Get in touch</div>
      <h1 class="page-title">Contact Rachel</h1>
      <p class="contact-desc">Have a question or want to connect? Fill out the form below and I'll be in touch.</p>

      <div class="form-card">
        <!-- IMPORTANT: Replace YOUR_FORM_ID below with your actual Formspree form ID -->
        <form action="https://formspree.io/f/xdayebyv" method="POST">
          <div class="form-group">
            <label class="form-label" for="name">Your name</label>
            <input class="form-input" type="text" id="name" name="name" placeholder="Jane Smith" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Your email</label>
            <input class="form-input" type="email" id="email" name="email" placeholder="jane@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="message">Message</label>
            <textarea class="form-textarea" id="message" name="message" placeholder="What would you like to discuss?" required></textarea>
          </div>
          <button class="form-submit" type="submit">Send message</button>
          <p class="form-note">Your information is kept private and will never be shared.</p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="footer-text">&copy; 2026 Rachel K. Lloyd, CPA, CITP &middot; rachelklloyd.me</p>
  </footer>

</body>
</html>
